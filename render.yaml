services:
  - type: web
    name: moran-studio-manager-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: moran-studio-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/moran-studio.db
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
